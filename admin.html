<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X27MINI · 商务链接生成器</title>
<style>
:root { --blue: #3789E6; --dark: #060e1f; --dark2: #0a1628; --green: #22c55e; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--dark);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.wrap { width: 100%; max-width: 560px; }

.top-logo { text-align: center; margin-bottom: 40px; }
.top-logo .brand {
  font-size: 11px; letter-spacing: 4px;
  color: rgba(255,255,255,0.25); text-transform: uppercase; margin-top: 12px;
}

.card {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px; padding: 40px;
}
.card-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 6px; }
.card-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 32px; line-height: 1.6; }

.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 11px; letter-spacing: 2px;
  color: rgba(55,137,230,0.8); text-transform: uppercase;
  margin-bottom: 8px; font-weight: 700;
}
.field input {
  width: 100%; padding: 13px 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; font-size: 15px; color: #fff;
  outline: none; transition: border-color 0.2s, background 0.2s;
  font-family: inherit;
}
.field input::placeholder { color: rgba(255,255,255,0.2); }
.field input:focus {
  border-color: rgba(55,137,230,0.5);
  background: rgba(55,137,230,0.06);
}

/* 访问码区块 */
.lock-section {
  margin: 24px 0;
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(255,255,255,0.02);
}
.lock-toggle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.lock-toggle-left { display: flex; align-items: center; gap: 10px; }
.lock-icon { font-size: 18px; }
.lock-label { font-size: 14px; font-weight: 700; color: #fff; }
.lock-desc { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }

/* switch */
.switch {
  position: relative; width: 44px; height: 24px; flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0; background: rgba(255,255,255,0.12);
  border-radius: 24px; cursor: pointer; transition: background 0.25s;
}
.slider::before {
  content: ""; position: absolute;
  width: 18px; height: 18px; left: 3px; top: 3px;
  background: #fff; border-radius: 50%;
  transition: transform 0.25s;
}
input:checked + .slider { background: var(--blue); }
input:checked + .slider::before { transform: translateX(20px); }

.lock-code-wrap { margin-top: 16px; display: none; }
.lock-code-wrap.show { display: block; }
.lock-code-wrap .field { margin-bottom: 0; }
.lock-hint {
  font-size: 11px; color: rgba(255,255,255,0.3);
  margin-top: 8px; line-height: 1.7;
}
.lock-hint strong { color: rgba(55,137,230,0.7); }

.btn-gen {
  width: 100%; padding: 16px;
  background: var(--blue); border: none; border-radius: 12px;
  font-size: 15px; font-weight: 800; color: #fff; cursor: pointer;
  margin-top: 8px; letter-spacing: 1px;
  transition: opacity 0.2s, transform 0.15s;
}
.btn-gen:hover { opacity: 0.88; }
.btn-gen:active { transform: scale(0.98); }

/* 结果 */
.result { margin-top: 24px; display: none; }
.result.show { display: block; }
.result-label { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 10px; }
.result-box {
  background: rgba(55,137,230,0.08);
  border: 1px solid rgba(55,137,230,0.2);
  border-radius: 12px; padding: 16px 18px;
  display: flex; align-items: center; gap: 12px;
}
.result-url { flex: 1; font-size: 12px; color: rgba(255,255,255,0.6); word-break: break-all; line-height: 1.7; }
.btn-copy {
  flex-shrink: 0; padding: 8px 18px;
  background: var(--blue); border: none; border-radius: 8px;
  font-size: 13px; font-weight: 700; color: #fff; cursor: pointer;
  transition: opacity 0.2s; white-space: nowrap;
}
.btn-copy:hover { opacity: 0.85; }
.btn-copy.copied { background: var(--green); }

/* 访问码提示条 */
.code-remind {
  display: none; margin-top: 12px;
  padding: 14px 16px;
  background: rgba(255,193,7,0.08);
  border: 1px solid rgba(255,193,7,0.2);
  border-radius: 10px;
  font-size: 13px; color: rgba(255,193,7,0.9);
  line-height: 1.7;
}
.code-remind.show { display: block; }
.code-remind strong { font-weight: 900; }

.preview-hint { margin-top: 14px; text-align: center; }
.btn-preview {
  font-size: 12px; color: rgba(55,137,230,0.7);
  background: none; border: none; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px;
}
.btn-preview:hover { color: var(--blue); }

/* ── 海报按钮 ── */
.btn-poster {
  width: 100%; margin-top: 10px; padding: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.7);
  cursor: pointer; transition: background 0.2s, border-color 0.2s;
  letter-spacing: 1px;
}
.btn-poster:hover { background: rgba(55,137,230,0.1); border-color: rgba(55,137,230,0.3); color: #fff; }

/* ── 海报弹窗 ── */
.poster-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
  align-items: center; justify-content: center; padding: 24px;
}
.poster-overlay.show { display: flex; flex-direction: column; gap: 20px; }
.poster-actions { display: flex; gap: 12px; }
.btn-dl {
  padding: 12px 28px; background: var(--blue); border: none;
  border-radius: 10px; font-size: 14px; font-weight: 800;
  color: #fff; cursor: pointer; transition: opacity 0.2s;
}
.btn-dl:hover { opacity: 0.85; }
.btn-close-poster {
  padding: 12px 20px; background: rgba(255,255,255,0.1); border: none;
  border-radius: 10px; font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,0.6); cursor: pointer;
}
#poster-canvas { display: none; }
#poster-img { border-radius: 16px; max-width: 100%; max-height: 65vh; display: block; }
.poster-mobile-hint {
  display: none; font-size: 13px; color: rgba(255,255,255,0.45);
  text-align: center; line-height: 1.8;
  padding: 10px 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
}
  background: none; border: none; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px;
}
.btn-preview:hover { color: var(--blue); }

/* 已保存 */
.saved { margin-top: 28px; }
.saved-title { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.25); text-transform: uppercase; margin-bottom: 14px; }
.saved-list { display: flex; flex-direction: column; gap: 8px; }
.saved-item {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; padding: 12px 16px; gap: 12px;
}
.saved-name { font-size: 14px; font-weight: 700; color: #fff; }
.saved-meta { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 2px; }
.saved-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-sm {
  padding: 6px 12px; border-radius: 6px;
  font-size: 12px; font-weight: 700; cursor: pointer; border: none;
  transition: opacity 0.2s;
}
.btn-sm:hover { opacity: 0.8; }
.btn-load { background: rgba(55,137,230,0.15); color: var(--blue); }
.btn-del  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }
.btn-copylink { background: var(--blue); color: #fff; }
.lock-badge {
  display: inline-block; font-size: 10px; padding: 2px 6px;
  background: rgba(255,193,7,0.15); color: rgba(255,193,7,0.8);
  border-radius: 4px; margin-left: 6px; vertical-align: middle;
}
</style>

<script>
const BASE = 'https://mingshuox27.github.io/x27mini/';
let currentUrl = '';

function toggleLock(el) {
  document.getElementById('lock-code-wrap').classList.toggle('show', el.checked);
}

// ── AES-GCM 加密 ──
async function deriveKey(code) {
  const enc = new TextEncoder();
  const mat = await crypto.subtle.importKey('raw', enc.encode(code), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode('x27mini-salt'), iterations: 100000, hash:'SHA-256' },
    mat, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function encryptData(obj, code) {
  const key = await deriveKey(code);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const buf = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(obj)));
  const combined = new Uint8Array(12 + buf.byteLength);
  combined.set(iv);
  combined.set(new Uint8Array(buf), 12);
  return btoa(String.fromCharCode(...combined));
}

async function generate() {
  const name  = document.getElementById('f-name').value.trim();
  const tel   = document.getElementById('f-tel').value.trim();
  const wx    = document.getElementById('f-wx').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const useLock = document.getElementById('lock-switch').checked;
  const code  = document.getElementById('f-code').value.trim();

  if (!name) { alert('请填写商务负责人姓名'); return; }
  if (useLock && !code) { alert('请设置访问码'); return; }

  const contact = { name, tel, wx, email };

  if (useLock) {
    const encrypted = await encryptData(contact, code);
    currentUrl = BASE + '#enc=' + encodeURIComponent(encrypted);
    document.getElementById('code-remind').classList.add('show');
    document.getElementById('remind-code').textContent = code;
  } else {
    const p = new URLSearchParams();
    if (name)  p.set('name', name);
    if (tel)   p.set('tel', tel);
    if (wx)    p.set('wx', wx);
    if (email) p.set('email', email);
    currentUrl = BASE + '?' + p.toString();
    document.getElementById('code-remind').classList.remove('show');
  }

  document.getElementById('result-url').textContent = currentUrl;
  document.getElementById('result').classList.add('show');
  const btn = document.getElementById('btn-copy');
  btn.textContent = '复制'; btn.classList.remove('copied');

  saveContact({ ...contact, code: useLock ? code : '' });
  renderSaved();
}

function copyLink() {
  navigator.clipboard.writeText(currentUrl).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '已复制 ✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  });
}
function previewLink() { window.open(currentUrl, '_blank'); }

// ── 本地存储 ──
function saveContact(c) {
  let list = JSON.parse(localStorage.getItem('x27_contacts') || '[]');
  const idx = list.findIndex(x => x.name === c.name);
  if (idx >= 0) list[idx] = c; else list.unshift(c);
  localStorage.setItem('x27_contacts', JSON.stringify(list));
}
function loadContacts() { return JSON.parse(localStorage.getItem('x27_contacts') || '[]'); }
function deleteContact(name) {
  localStorage.setItem('x27_contacts', JSON.stringify(loadContacts().filter(x => x.name !== name)));
  renderSaved();
}
function loadIntoForm(c) {
  document.getElementById('f-name').value  = c.name  || '';
  document.getElementById('f-tel').value   = c.tel   || '';
  document.getElementById('f-wx').value    = c.wx    || '';
  document.getElementById('f-email').value = c.email || '';
  const useLock = !!c.code;
  document.getElementById('lock-switch').checked = useLock;
  toggleLock({ checked: useLock });
  if (useLock) document.getElementById('f-code').value = c.code;
  generate();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
async function copyContactLink(c) {
  let url;
  if (c.code) {
    const encrypted = await encryptData({ name:c.name, tel:c.tel, wx:c.wx, email:c.email }, c.code);
    url = BASE + '#enc=' + encodeURIComponent(encrypted);
  } else {
    const p = new URLSearchParams();
    if (c.name)  p.set('name', c.name);
    if (c.tel)   p.set('tel', c.tel);
    if (c.wx)    p.set('wx', c.wx);
    if (c.email) p.set('email', c.email);
    url = BASE + '?' + p.toString();
  }
  navigator.clipboard.writeText(url).then(() => alert(`已复制 ${c.name} 的链接`));
}
function renderSaved() {
  const list = loadContacts();
  const wrap = document.getElementById('saved-wrap');
  const el   = document.getElementById('saved-list');
  if (!list.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  el.innerHTML = list.map(c => `
    <div class="saved-item">
      <div>
        <div class="saved-name">${c.name}${c.code ? '<span class="lock-badge">🔒 有访问码</span>' : ''}</div>
        <div class="saved-meta">${c.tel || ''}${c.code ? ' · 访问码：' + c.code : ''}</div>
      </div>
      <div class="saved-actions">
        <button class="btn-sm btn-copylink" onclick='copyContactLink(${JSON.stringify(c)})'>复制链接</button>
        <button class="btn-sm btn-load" onclick='loadIntoForm(${JSON.stringify(c)})'>编辑</button>
        <button class="btn-sm btn-del" onclick="deleteContact('${c.name}')">删除</button>
      </div>
    </div>
  `).join('');
}
document.querySelectorAll('input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
});
renderSaved();

// ── QR + 海报 ──
function loadQRLib() {
  return new Promise((res, rej) => {
    if (window.QRCode) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function showPoster() {
  if (!currentUrl) { alert('请先生成专属链接'); return; }
  await loadQRLib();
  const name  = document.getElementById('f-name').value.trim() || '商务专员';
  const tel   = document.getElementById('f-tel').value.trim();
  await drawPoster(name, tel, currentUrl);

  // 把 canvas 转成 img（iOS 微信可长按 img 保存，canvas 不行）
  const canvas = document.getElementById('poster-canvas');
  const img = document.getElementById('poster-img');
  img.src = canvas.toDataURL('image/png');

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  document.getElementById('poster-mobile-hint').style.display = isMobile ? 'block' : 'none';
  document.getElementById('poster-actions').style.display     = isMobile ? 'none'  : 'flex';

  document.getElementById('poster-overlay').classList.add('show');
}

async function drawPoster(name, tel, url) {
  const W = 750, H = 1200;
  const canvas = document.getElementById('poster-canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 背景渐变
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#060e1f');
  bg.addColorStop(0.5, '#0a1628');
  bg.addColorStop(1,   '#060e1f');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // 右下角光晕
  const glow = ctx.createRadialGradient(W, H, 0, W, H, 600);
  glow.addColorStop(0, 'rgba(55,137,230,0.18)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  // 顶部蓝色细线
  ctx.fillStyle = '#3789E6';
  ctx.fillRect(0, 0, W, 3);

  // ── 品牌标签 ──
  ctx.font = 'bold 22px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(55,137,230,0.7)';
  ctx.letterSpacing = '4px';
  ctx.fillText('X27MINI  ·  美妆闪电仓', 60, 80);

  // 品牌大字
  ctx.font = 'bold 72px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('X27', 60, 200);
  ctx.fillStyle = '#3789E6';
  ctx.fillText('MINI', 220, 200);

  // 副标题
  ctx.font = '24px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('品  牌  合  作  手  册', 62, 248);

  // 分割线
  ctx.strokeStyle = 'rgba(55,137,230,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 285); ctx.lineTo(W - 60, 285); ctx.stroke();

  // 中间说明文字
  ctx.font = 'bold 32px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('扫码查看品牌合作资料', W / 2, 360);

  ctx.font = '22px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('即时零售 · 美妆垂类 · 前置仓连锁', W / 2, 400);

  // ── 二维码 ──
  const QR_SIZE = 320;
  const qrCanvas = document.createElement('canvas');
  await QRCode.toCanvas(qrCanvas, url, {
    width: QR_SIZE, margin: 2,
    color: { dark: '#ffffff', light: '#0a1628' }
  });
  // 白色圆角底板
  const pad = 20;
  const qrX = (W - QR_SIZE - pad * 2) / 2;
  const qrY = 440;
  roundRect(ctx, qrX, qrY, QR_SIZE + pad * 2, QR_SIZE + pad * 2, 20);
  ctx.fillStyle = '#0a1628';
  ctx.fill();
  ctx.strokeStyle = 'rgba(55,137,230,0.3)';
  ctx.lineWidth = 1.5; ctx.stroke();
  ctx.drawImage(qrCanvas, qrX + pad, qrY + pad, QR_SIZE, QR_SIZE);

  // ── 商务信息 ──
  const infoY = qrY + QR_SIZE + pad * 2 + 60;

  ctx.font = 'bold 44px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(name, W / 2, infoY);

  ctx.font = '22px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(55,137,230,0.8)';
  ctx.fillText('商务负责人  ·  X27MINI', W / 2, infoY + 44);

  if (tel) {
    ctx.font = '22px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(tel, W / 2, infoY + 86);
  }

  // ── Slogan（分段上色，精确定位）──
  ctx.textAlign = 'left';
  ctx.font = 'bold 28px -apple-system, PingFang SC, sans-serif';
  const segments = [
    { text: '心动', color: '#3789E6' },
    { text: '物超所值', color: 'rgba(255,255,255,0.75)' },
    { text: '  ·  ', color: 'rgba(255,255,255,0.3)' },
    { text: '热爱', color: '#3789E6' },
    { text: '即刻兑现', color: 'rgba(255,255,255,0.75)' },
  ];
  let totalW = segments.reduce((acc, s) => acc + ctx.measureText(s.text).width, 0);
  let sx = (W - totalW) / 2;
  segments.forEach(s => {
    ctx.fillStyle = s.color;
    ctx.fillText(s.text, sx, H - 80);
    sx += ctx.measureText(s.text).width;
  });

  ctx.font = '18px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.textAlign = 'center';
  ctx.fillText('遥望科技旗下品牌', W / 2, H - 40);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function downloadPoster() {
  const name = document.getElementById('f-name').value.trim() || '商务海报';
  const canvas = document.getElementById('poster-canvas');
  const a = document.createElement('a');
  a.download = `X27MINI_${name}_海报.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
